<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" role="img" aria-label="Bodega Artesanal Kunaq">
  <!-- Símbolo rombo geométrico andino -->
  <g transform="translate(4, 6)">
    <!-- Rombo exterior -->
    <polygon points="30,0 60,30 30,60 0,30"
      fill="none" stroke="#C9A84C" stroke-width="1.6"/>
    <!-- Rombo interior -->
    <polygon points="30,12 48,30 30,48 12,30"
      fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.55"/>
    <!-- Centro sólido -->
    <polygon points="30,22 38,30 30,38 22,30"
      fill="#C9A84C"/>
    <!-- Líneas cardinales decorativas -->
    <line x1="30" y1="0"  x2="30" y2="12" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
    <line x1="30" y1="48" x2="30" y2="60" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
    <line x1="0"  y1="30" x2="12" y2="30" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
    <line x1="48" y1="30" x2="60" y2="30" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- Texto KUNAQ -->
  <text x="82" y="32"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    letter-spacing="7"
    fill="#C9A84C"
    font-weight="400">KUNAQ</text>
  <!-- Subtítulo -->
  <text x="84" y="52"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="7.5"
    letter-spacing="4"
    fill="#C9A84C"
    opacity="0.65">BODEGA ARTESANAL</text>
</svg>
