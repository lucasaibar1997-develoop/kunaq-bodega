<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 120" preserveAspectRatio="none">
  <defs>
    <g id="cf-lg">
      <rect x="-7" y="-90" width="14" height="90" rx="7"/>
      <rect x="-28" y="-75" width="28" height="10" rx="5"/>
      <rect x="-28" y="-95" width="10" height="28" rx="5"/>
      <rect x="7"  y="-65" width="28" height="10" rx="5"/>
      <rect x="25" y="-85" width="10" height="28" rx="5"/>
    </g>
    <g id="cf-md">
      <rect x="-5" y="-55" width="10" height="55" rx="5"/>
      <rect x="-18" y="-46" width="18" height="7" rx="4"/>
      <rect x="-18" y="-62" width="7" height="20" rx="4"/>
      <rect x="5"  y="-38" width="18" height="7" rx="4"/>
      <rect x="16" y="-54" width="7" height="20" rx="4"/>
    </g>
    <g id="cf-sm">
      <rect x="-4" y="-36" width="8" height="36" rx="4"/>
      <rect x="-13" y="-29" width="13" height="5" rx="3"/>
      <rect x="-13" y="-40" width="5" height="15" rx="3"/>
      <rect x="4"  y="-24" width="13" height="5" rx="3"/>
      <rect x="11" y="-34" width="5" height="15" rx="3"/>
    </g>
  </defs>

  <!-- Fondo oscuro total -->
  <rect x="0" y="0" width="1440" height="120" fill="#0A0804"/>
  <rect x="0" y="108" width="1440" height="12" fill="#0E0C0A"/>

  <!-- Cactus grandes — más oscuros para footer -->
  <use href="#cf-lg" transform="translate(100,108)"  fill="#2A3020"/>
  <use href="#cf-lg" transform="translate(320,108) scale(1.1)" fill="#1E2618"/>
  <use href="#cf-lg" transform="translate(560,108) scale(0.9)" fill="#2A3020"/>
  <use href="#cf-lg" transform="translate(780,108) scale(1.2)" fill="#1E2618"/>
  <use href="#cf-lg" transform="translate(1000,108) scale(0.95)" fill="#2A3020"/>
  <use href="#cf-lg" transform="translate(1220,108) scale(1.05)" fill="#1E2618"/>
  <use href="#cf-lg" transform="translate(1400,108)" fill="#2A3020"/>

  <!-- Cactus medianos -->
  <use href="#cf-md" transform="translate(50,108)"   fill="#344030"/>
  <use href="#cf-md" transform="translate(200,108)"  fill="#2A3020"/>
  <use href="#cf-md" transform="translate(440,108)"  fill="#344030"/>
  <use href="#cf-md" transform="translate(670,108)"  fill="#2A3020"/>
  <use href="#cf-md" transform="translate(900,108)"  fill="#344030"/>
  <use href="#cf-md" transform="translate(1120,108)" fill="#2A3020"/>
  <use href="#cf-md" transform="translate(1330,108)" fill="#344030"/>

  <!-- Cactus pequeños — relleno de densidad -->
  <use href="#cf-sm" transform="translate(25,108)"   fill="#3A4C34"/>
  <use href="#cf-sm" transform="translate(140,108)"  fill="#2E3C28"/>
  <use href="#cf-sm" transform="translate(270,108)"  fill="#3A4C34"/>
  <use href="#cf-sm" transform="translate(390,108)"  fill="#2E3C28"/>
  <use href="#cf-sm" transform="translate(500,108)"  fill="#3A4C34"/>
  <use href="#cf-sm" transform="translate(620,108)"  fill="#2E3C28"/>
  <use href="#cf-sm" transform="translate(730,108)"  fill="#3A4C34"/>
  <use href="#cf-sm" transform="translate(850,108)"  fill="#2E3C28"/>
  <use href="#cf-sm" transform="translate(960,108)"  fill="#3A4C34"/>
  <use href="#cf-sm" transform="translate(1070,108)" fill="#2E3C28"/>
  <use href="#cf-sm" transform="translate(1180,108)" fill="#3A4C34"/>
  <use href="#cf-sm" transform="translate(1290,108)" fill="#2E3C28"/>
  <use href="#cf-sm" transform="translate(1370,108)" fill="#3A4C34"/>
  <use href="#cf-sm" transform="translate(1440,108)" fill="#2E3C28"/>
</svg>
