<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 160" preserveAspectRatio="none">
  <defs>
    <g id="cardon-lg">
      <rect x="-7" y="-90" width="14" height="90" rx="7"/>
      <rect x="-28" y="-75" width="28" height="10" rx="5"/>
      <rect x="-28" y="-95" width="10" height="28" rx="5"/>
      <rect x="7"  y="-65" width="28" height="10" rx="5"/>
      <rect x="25" y="-85" width="10" height="28" rx="5"/>
    </g>
    <g id="cardon-md">
      <rect x="-5" y="-60" width="10" height="60" rx="5"/>
      <rect x="-20" y="-50" width="20" height="7" rx="4"/>
      <rect x="-20" y="-68" width="7" height="22" rx="4"/>
      <rect x="5"  y="-42" width="20" height="7" rx="4"/>
      <rect x="18" y="-58" width="7" height="22" rx="4"/>
    </g>
    <g id="cardon-sm">
      <rect x="-4" y="-40" width="8" height="40" rx="4"/>
      <rect x="-14" y="-32" width="14" height="6" rx="3"/>
      <rect x="-14" y="-44" width="6" height="16" rx="3"/>
      <rect x="4"  y="-27" width="14" height="6" rx="3"/>
      <rect x="12" y="-38" width="6" height="16" rx="3"/>
    </g>
  </defs>

  <!-- Gradiente de fondo -->
  <rect x="0" y="0" width="1440" height="160" fill="#1C0A00"/>
  <rect x="0" y="60" width="1440" height="100" fill="#1E1C18"/>

  <!-- Suelo -->
  <rect x="0" y="148" width="1440" height="12" fill="#0E0C0A"/>

  <!-- Piedras -->
  <ellipse cx="150"  cy="152" rx="30" ry="8" fill="#3A3630" opacity="0.8"/>
  <ellipse cx="700"  cy="153" rx="45" ry="7" fill="#2A2620" opacity="0.7"/>
  <ellipse cx="1200" cy="152" rx="35" ry="8" fill="#3A3630" opacity="0.8"/>
  <ellipse cx="400"  cy="154" rx="20" ry="5" fill="#2A2620" opacity="0.6"/>
  <ellipse cx="950"  cy="153" rx="25" ry="6" fill="#3A3630" opacity="0.7"/>

  <!-- Cactus grandes -->
  <use href="#cardon-lg" transform="translate(120,148)"  fill="#4A5240"/>
  <use href="#cardon-lg" transform="translate(480,148) scale(1.2)"  fill="#3A4230"/>
  <use href="#cardon-lg" transform="translate(960,148) scale(0.9)"  fill="#4A5240"/>
  <use href="#cardon-lg" transform="translate(1300,148) scale(1.1)" fill="#3A4230"/>

  <!-- Cactus medianos -->
  <use href="#cardon-md" transform="translate(260,148)"  fill="#5A6450"/>
  <use href="#cardon-md" transform="translate(640,148)"  fill="#4A5240"/>
  <use href="#cardon-md" transform="translate(820,148)"  fill="#5A6450"/>
  <use href="#cardon-md" transform="translate(1100,148)" fill="#4A5240"/>
  <use href="#cardon-md" transform="translate(1420,148)" fill="#3A4230"/>

  <!-- Cactus pequeños -->
  <use href="#cardon-sm" transform="translate(60,148)"   fill="#6A7460"/>
  <use href="#cardon-sm" transform="translate(200,148)"  fill="#5A6450"/>
  <use href="#cardon-sm" transform="translate(370,148)"  fill="#6A7460"/>
  <use href="#cardon-sm" transform="translate(560,148)"  fill="#5A6450"/>
  <use href="#cardon-sm" transform="translate(750,148)"  fill="#6A7460"/>
  <use href="#cardon-sm" transform="translate(880,148)"  fill="#5A6450"/>
  <use href="#cardon-sm" transform="translate(1050,148)" fill="#6A7460"/>
  <use href="#cardon-sm" transform="translate(1180,148)" fill="#5A6450"/>
  <use href="#cardon-sm" transform="translate(1380,148)" fill="#6A7460"/>
</svg>
