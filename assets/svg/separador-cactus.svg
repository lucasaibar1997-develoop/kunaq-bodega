<svg viewBox="0 0 1200 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Cactus grande — centro izquierda -->
  <g transform="translate(480, 4) scale(1.1)" fill="#C9A84C" opacity="0.35">
    <rect x="18" y="22" width="14" height="54" rx="7"/>
    <rect x="0"  y="32" width="36" height="8"  rx="4"/>
    <rect x="0"  y="17" width="8"  height="23" rx="4"/>
    <rect x="28" y="30" width="36" height="8"  rx="4"/>
    <rect x="56" y="15" width="8"  height="23" rx="4"/>
  </g>

  <!-- Cactus mediano — izquierda -->
  <g transform="translate(240, 14) scale(0.75)" fill="#C9A84C" opacity="0.28">
    <rect x="18" y="22" width="14" height="54" rx="7"/>
    <rect x="0"  y="32" width="36" height="8"  rx="4"/>
    <rect x="0"  y="17" width="8"  height="23" rx="4"/>
    <rect x="28" y="30" width="36" height="8"  rx="4"/>
    <rect x="56" y="15" width="8"  height="23" rx="4"/>
  </g>

  <!-- Cactus mediano — derecha -->
  <g transform="translate(740, 12) scale(0.82)" fill="#C9A84C" opacity="0.30">
    <rect x="18" y="22" width="14" height="54" rx="7"/>
    <rect x="0"  y="32" width="36" height="8"  rx="4"/>
    <rect x="0"  y="17" width="8"  height="23" rx="4"/>
    <rect x="28" y="30" width="36" height="8"  rx="4"/>
    <rect x="56" y="15" width="8"  height="23" rx="4"/>
  </g>

  <!-- Cactus pequeño — extremo izquierdo -->
  <g transform="translate(80, 24) scale(0.52)" fill="#C9A84C" opacity="0.22">
    <rect x="18" y="22" width="14" height="54" rx="7"/>
    <rect x="28" y="30" width="30" height="7"  rx="4"/>
    <rect x="56" y="16" width="7"  height="20" rx="4"/>
  </g>

  <!-- Cactus pequeño — extremo derecho -->
  <g transform="translate(1010, 20) scale(0.60)" fill="#C9A84C" opacity="0.22">
    <rect x="18" y="22" width="14" height="54" rx="7"/>
    <rect x="0"  y="34" width="30" height="7"  rx="4"/>
    <rect x="0"  y="20" width="7"  height="20" rx="4"/>
  </g>

  <!-- Línea de tierra sutil -->
  <line x1="0" y1="78" x2="1200" y2="78" stroke="#C9A84C" stroke-width="0.5" opacity="0.15"/>
</svg>
